<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search | Office of Tyler Nicholas</title>
    
    <link rel="icon" href="https://www.flagsonline.it/uploads/2016-6-6/420-272/seychelles.jpg" type="image/jpeg">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        signature: ['Great Vibes', 'cursive'],
                    },
                    colors: {
                        brand: {
                            blue: '#0033a0',
                            lightblue: '#005eb8',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .fade-out { opacity: 0; visibility: hidden; transition: opacity 0.5s ease-out, visibility 0.5s ease-out; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #0033a0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #005eb8; }
        
        /* Highlight styling for searched keywords */
        .highlight {
            background-color: #fef08a; /* yellow-200 */
            font-weight: 700;
            color: #111827; 
            padding: 0 2px;
            border-radius: 2px;
        }
    </style>
</head>
<body class="font-sans bg-gray-50 text-gray-800 antialiased overflow-hidden" id="body">

    <div id="loader" class="fixed inset-0 z-50 flex items-center justify-center bg-white transition-opacity duration-500">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-brand-blue mb-4"></div>
            <p class="text-gray-500 font-medium tracking-widest uppercase text-sm">Initializing</p>
        </div>
    </div>

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex-shrink-0 flex items-center">
                    <a href="/" class="text-xl font-bold text-brand-blue tracking-tight hover:text-brand-lightblue transition">
                        Office of Tyler Nicholas
                    </a>
                </div>
                
                <div class="hidden lg:flex items-center space-x-8">
                    <a href="/" class="text-gray-600 hover:text-brand-blue transition font-medium">Home</a>
                    <a href="/about/" class="text-gray-600 hover:text-brand-blue transition font-medium">About</a>
                    <a href="/public-service/" class="text-gray-600 hover:text-brand-blue transition font-medium">Public Service</a>
                    <a href="/initiatives/" class="text-gray-600 hover:text-brand-blue transition font-medium">Initiatives</a>
                    <a href="/newsroom/" class="text-gray-600 hover:text-brand-blue transition font-medium">Newsroom</a>
                    <a href="/resources/" class="text-gray-600 hover:text-brand-blue transition font-medium">Resources</a>
                    <a href="/contact/" class="text-gray-600 hover:text-brand-blue transition font-medium">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="w-full py-24 bg-cover bg-center bg-no-repeat relative border-b-4 border-brand-blue" 
            style="background-image: url('https://res.cloudinary.com/enchanting/q_auto:good,f_auto,c_lfill,w_1450,h_550/myo-web/2024/05/base_seychelles_00.jpg');">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
            <h1 class="text-4xl md:text-5xl font-black text-white tracking-tight mb-8 [text-shadow:_0_4px_12px_rgb(0_0_0_/_80%)]">Global Search</h1>
            
            <form id="master-search-form" class="relative flex items-center shadow-2xl rounded-full max-w-3xl mx-auto" onsubmit="handleSearchSubmit(event)">
                <i class="fa-solid fa-search absolute left-6 text-gray-400 text-xl"></i>
                <input type="text" id="search-input" placeholder="Search policies, initiatives, news, or documents..." 
                       class="w-full pl-16 pr-32 py-5 bg-white rounded-full text-gray-900 focus:outline-none focus:ring-4 focus:ring-brand-lightblue/50 text-lg placeholder-gray-400 transition-all font-medium border-0" required autocomplete="off">
                <button type="submit" id="search-btn" class="absolute right-2 px-8 py-3 bg-gray-900 text-white font-bold rounded-full hover:bg-black transition shadow-md">
                    Search
                </button>
            </form>
        </div>
    </header>

    <section class="bg-gray-50 py-16 min-h-[60vh]">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 border-b border-gray-200 pb-6">
                <div class="text-gray-600 font-medium">
                    Found <span id="result-count" class="font-black text-brand-blue text-xl">0</span> results for <span id="query-display" class="italic text-gray-900 font-bold">""</span>
                </div>
                
                <div class="flex flex-wrap gap-2 justify-center" id="search-filters">
                    <button onclick="filterResults('All')" class="filter-btn active px-4 py-1.5 bg-gray-900 text-white text-xs font-bold uppercase tracking-wider rounded-full shadow-sm transition">All</button>
                    <button onclick="filterResults('Policy')" class="filter-btn px-4 py-1.5 bg-white text-gray-600 border border-gray-200 hover:border-brand-blue text-xs font-bold uppercase tracking-wider rounded-full transition">Policies</button>
                    <button onclick="filterResults('Initiative')" class="filter-btn px-4 py-1.5 bg-white text-gray-600 border border-gray-200 hover:border-brand-blue text-xs font-bold uppercase tracking-wider rounded-full transition">Initiatives</button>
                    <button onclick="filterResults('News')" class="filter-btn px-4 py-1.5 bg-white text-gray-600 border border-gray-200 hover:border-brand-blue text-xs font-bold uppercase tracking-wider rounded-full transition">News</button>
                    <button onclick="filterResults('Document')" class="filter-btn px-4 py-1.5 bg-white text-gray-600 border border-gray-200 hover:border-brand-blue text-xs font-bold uppercase tracking-wider rounded-full transition">Documents</button>
                </div>
            </div>

            <div id="results-container" class="space-y-4">
                </div>

        </div>
    </section>

    <footer class="bg-gray-900 text-white pt-16 pb-8 border-t-4 border-brand-blue">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-8 mb-12">
                <div class="md:col-span-6">
                    <h4 class="text-xl font-bold tracking-wider mb-2 text-white">OFFICE OF TYLER NICHOLAS</h4>
                    <p class="text-gray-400 text-sm mb-6">Public Service. Youth Leadership. National Progress.</p>
                </div>
            </div>
            <div class="border-t border-gray-800 pt-8 flex flex-col md:flex-row justify-between items-center text-sm text-gray-500">
                <p>&copy; <script>document.write(new Date().getFullYear())</script> Office of Tyler Nicholas. All rights reserved.</p>
                <div class="mt-4 md:mt-0 flex items-center gap-4">
                    <a href="/admin/" class="text-xs font-bold text-gray-600 hover:text-white uppercase tracking-widest border border-gray-700 hover:border-gray-500 px-3 py-1 rounded transition"><i class="fa-solid fa-lock mr-1 text-[10px]"></i> Admin Portal</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Supabase Connection
        const SUPABASE_URL = 'https://qcwldyvecokspamcjgbl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjd2xkeXZlY29rc3BhbWNqZ2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTYzNjksImV4cCI6MjA5NDA5MjM2OX0.4du52QpdsRaUATJ5qXeA1sd7zVEOPSlJ1KJJ9KQvjHk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================================
        // 1. STATIC INDEX (For fixed pages & core policies)
        // ==========================================
        const STATIC_INDEX = [
            { title: "Education Reform", category: "Policy", desc: "A modern education system focused on student-centered learning, career guidance, and wellbeing.", url: "/public-service/education-reform/", search_text: "school learning students teachers reform grades classes" },
            { title: "Youth Participation", category: "Policy", desc: "Empowering young people to take active roles in national decision-making and civic leadership.", url: "/public-service/youth-participation/", search_text: "empowerment assembly voice vote representation" },
            { title: "Digital Access", category: "Policy", desc: "Ensuring digital inclusion, technology skills, and online resources are available to all youth.", url: "/public-service/digital-access/", search_text: "internet technology computers coding web digital skills" },
            { title: "Mental Health", category: "Policy", desc: "Fostering supportive environments, expanding access to care, and reducing the stigma of seeking help.", url: "/public-service/mental-health/", search_text: "wellbeing counselling support psychology therapy depression anxiety" },
            { title: "Community Service", category: "Policy", desc: "Fostering civic responsibility and volunteering for the betterment of Seychelles communities.", url: "/public-service/community-service/", search_text: "volunteer charity help clean up service district" },
            { title: "National Development", category: "Policy", desc: "Driving Seychelles forward through public service modernization and strategic youth leadership.", url: "/public-service/national-development/", search_text: "governance economy future progress country national" },
            { title: "Student Wellbeing", category: "Policy", desc: "Focusing on the daily student experience—balancing academic performance with emotional support.", url: "/public-service/student-wellbeing/", search_text: "stress bullying school rules health emotional support" },
            { title: "Innovation & Enterprise", category: "Policy", desc: "Empowering youth entrepreneurship, digital startups, and building pathways for business creation.", url: "/public-service/innovation-enterprise/", search_text: "business startup economy money finance entrepreneur" },
            { title: "National Youth Resources & Opportunity Hub", category: "Initiative", desc: "A digital platform designed to bring together youth support, educational resources, and opportunities.", url: "/initiatives/more/", search_text: "hub website directory database online platform" },
            { title: "The Tyler Nicholas Foundation", category: "Initiative", desc: "The philanthropic arm focused on humanitarian efforts, educational sponsorships, and community relief.", url: "https://tyler-nicholas-foundation.online", search_text: "charity ngo help foundation humanitarian" },
            { title: "About Tyler Nicholas", category: "Page", desc: "Read the official biography, mission statement, and guiding principles of the Office.", url: "/about/", search_text: "who is founder biography background tyler nicholas history" },
            { title: "Contact the Office", category: "Page", desc: "Submit press inquiries, partnership proposals, or general messages to the team.", url: "/contact/", search_text: "email message press media reach out connect" },
            { title: "Volunteer Sign-Up", category: "Page", desc: "Register your interest to volunteer for community projects and national initiatives.", url: "/contact/", search_text: "help out join register sign up volunteer" }
        ];

        let currentQuery = "";
        let currentFilter = "All";
        let masterResults = [];

        // UI Setup
        document.addEventListener('DOMContentLoaded', function() {
            const loader = document.getElementById('loader');
            const body = document.getElementById('body');
            
            function hideLoader() {
                if (loader) loader.style.opacity = '0';
                setTimeout(() => { if(loader) loader.style.display = 'none'; }, 500);
                if (body) body.classList.remove('overflow-hidden');
            }
            window.addEventListener('load', hideLoader);
            setTimeout(hideLoader, 1500);

            // Read URL Param on load
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            
            if (query) {
                document.getElementById('search-input').value = query;
                executeHybridSearch(query);
            } else {
                masterResults = STATIC_INDEX; // Load defaults
                renderResults();
            }
        });

        // Form Submit
        function handleSearchSubmit(e) {
            e.preventDefault();
            const query = document.getElementById('search-input').value;
            const newUrl = `${window.location.pathname}?q=${encodeURIComponent(query)}`;
            window.history.pushState({path: newUrl}, '', newUrl);
            executeHybridSearch(query);
        }

        // Category Filter
        function filterResults(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.textContent.trim().toLowerCase() === category.toLowerCase() || (category === 'All' && btn.textContent.trim() === 'All')) {
                    btn.className = "filter-btn active px-4 py-1.5 bg-gray-900 text-white text-xs font-bold uppercase tracking-wider rounded-full shadow-sm transition";
                } else {
                    btn.className = "filter-btn px-4 py-1.5 bg-white text-gray-600 border border-gray-200 hover:border-brand-blue text-xs font-bold uppercase tracking-wider rounded-full transition";
                }
            });
            renderResults();
        }

        // ==========================================
        // 2. THE HYBRID SEARCH ENGINE
        // ==========================================
        async function executeHybridSearch(query) {
            currentQuery = query.toLowerCase().trim();
            document.getElementById('query-display').textContent = currentQuery ? `"${query}"` : "All Content";
            
            const btn = document.getElementById('search-btn');
            const container = document.getElementById('results-container');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            container.innerHTML = '<div class="py-12 text-center text-gray-500 font-mono text-sm">Searching database & pages...</div>';

            masterResults = [];

            // A. Search Static Index (Regex match on title, desc, or tags)
            if (currentQuery) {
                const staticMatches = STATIC_INDEX.filter(item => {
                    return item.title.toLowerCase().includes(currentQuery) || 
                           item.desc.toLowerCase().includes(currentQuery) || 
                           item.search_text.toLowerCase().includes(currentQuery);
                });
                masterResults.push(...staticMatches);
            } else {
                masterResults.push(...STATIC_INDEX);
            }

            // B. Search Supabase Database (if query exists)
            if (currentQuery && supabaseClient) {
                try {
                    const searchPattern = `%${currentQuery}%`;

                    // Run parallel queries across tables
                    const [initData, newsData, resData] = await Promise.all([
                        supabaseClient.from('initiatives').select('title, summary, status').or(`title.ilike.${searchPattern},summary.ilike.${searchPattern}`),
                        supabaseClient.from('news_articles').select('title, content, category').or(`title.ilike.${searchPattern},content.ilike.${searchPattern}`),
                        supabaseClient.from('resources').select('title, description, file_url').or(`title.ilike.${searchPattern},description.ilike.${searchPattern}`)
                    ]);

                    // Map Initiatives
                    if (initData.data) {
                        initData.data.forEach(item => {
                            masterResults.push({
                                title: item.title,
                                category: 'Initiative',
                                desc: item.summary || 'Database record match.',
                                url: '/initiatives/'
                            });
                        });
                    }

                    // Map News
                    if (newsData.data) {
                        newsData.data.forEach(item => {
                            // Strip HTML tags for clean description snippet
                            let snippet = item.content ? item.content.replace(/<[^>]*>?/gm, '').substring(0, 150) + '...' : 'Database record match.';
                            masterResults.push({
                                title: item.title,
                                category: 'News',
                                desc: snippet,
                                url: '/newsroom/'
                            });
                        });
                    }

                    // Map Resources
                    if (resData.data) {
                        resData.data.forEach(item => {
                            masterResults.push({
                                title: item.title,
                                category: 'Document',
                                desc: item.description || 'Downloadable resource match.',
                                url: item.file_url || '/resources/'
                            });
                        });
                    }

                } catch (error) {
                    console.error("Supabase search bypassed or failed.", error);
                }
            }

            // Remove exact duplicates by Title to keep results clean
            const uniqueResults = [];
            const seenTitles = new Set();
            for (const item of masterResults) {
                if (!seenTitles.has(item.title)) {
                    seenTitles.add(item.title);
                    uniqueResults.push(item);
                }
            }
            masterResults = uniqueResults;

            btn.innerHTML = 'Search';
            renderResults();
        }

        // Highlight matching text
        function highlightText(text, query) {
            if (!query || !text) return text || '';
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        // Visual mapping for categories
        function getCategoryUI(category) {
            switch(category) {
                case 'Policy': return { icon: 'fa-landmark', color: 'text-brand-blue bg-blue-50 border-blue-100' };
                case 'Initiative': return { icon: 'fa-bolt', color: 'text-green-600 bg-green-50 border-green-100' };
                case 'News': return { icon: 'fa-newspaper', color: 'text-orange-500 bg-orange-50 border-orange-100' };
                case 'Document': return { icon: 'fa-file-pdf', color: 'text-red-500 bg-red-50 border-red-100' };
                case 'Page': return { icon: 'fa-compass', color: 'text-purple-600 bg-purple-50 border-purple-100' };
                default: return { icon: 'fa-layer-group', color: 'text-gray-600 bg-gray-100 border-gray-200' };
            }
        }

        // Render Data to DOM
        function renderResults() {
            const container = document.getElementById('results-container');
            
            let finalResults = masterResults;
            if (currentFilter !== 'All') {
                finalResults = finalResults.filter(item => item.category === currentFilter);
            }

            document.getElementById('result-count').textContent = finalResults.length;

            if (finalResults.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-2xl border border-gray-200 p-12 text-center shadow-sm">
                        <i class="fa-solid fa-search-minus text-4xl text-gray-300 mb-4 block"></i>
                        <h4 class="text-xl font-bold text-gray-900 mb-2">No results found</h4>
                        <p class="text-gray-500 text-sm">We couldn't find anything matching your search criteria. Try adjusting your keywords or browse the directory directly.</p>
                    </div>`;
                return;
            }

            let html = '';
            finalResults.forEach(item => {
                const ui = getCategoryUI(item.category);
                const highlightedTitle = highlightText(item.title, currentQuery);
                const highlightedDesc = highlightText(item.desc, currentQuery);
                const targetAttr = item.url.startsWith('http') || item.url.endsWith('.pdf') ? 'target="_blank"' : '';

                html += `
                <a href="${item.url}" ${targetAttr} class="block bg-white rounded-xl border border-gray-200 p-6 shadow-sm hover:shadow-lg hover:border-brand-lightblue transition duration-300 group">
                    <div class="flex flex-col sm:flex-row gap-4 sm:items-center">
                        <div class="w-12 h-12 rounded-lg flex items-center justify-center text-xl shrink-0 border ${ui.color} group-hover:scale-110 transition duration-300 shadow-sm">
                            <i class="fa-solid ${ui.icon}"></i>
                        </div>
                        <div class="flex-grow">
                            <div class="flex items-center gap-3 mb-1">
                                <span class="text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 rounded border ${ui.color}">${item.category}</span>
                            </div>
                            <h4 class="text-lg font-bold text-gray-900 group-hover:text-brand-blue transition leading-tight mb-1">${highlightedTitle}</h4>
                            <p class="text-sm text-gray-600 line-clamp-2 leading-relaxed">${highlightedDesc}</p>
                        </div>
                        <div class="hidden sm:flex shrink-0 text-gray-300 group-hover:text-brand-lightblue transition pl-4 border-l border-gray-100">
                            <i class="fa-solid fa-chevron-right text-xl transform group-hover:translate-x-1 transition"></i>
                        </div>
                    </div>
                </a>`;
            });

            container.innerHTML = html;
        }
    </script>
</body>
</html>
