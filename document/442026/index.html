<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classified Document | Office of Tyler Nicholas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'], 
                        serif: ['Playfair Display', 'serif'] 
                    },
                    colors: { brand: { dark: '#0f172a', light: '#f8fafc', accent: '#3b82f6' } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #e2e8f0; }
        .paper-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 relative">

    <div id="auth-gate" class="fixed inset-0 bg-brand-dark z-50 flex flex-col items-center justify-center p-6 transition-opacity duration-500">
        <div class="bg-white p-10 rounded-2xl shadow-2xl max-w-md w-full text-center">
            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-lock text-2xl text-brand-dark"></i>
            </div>
            <h2 class="text-2xl font-bold font-serif mb-2">Protected Document</h2>
            <p class="text-sm text-gray-500 mb-8">Enter the decryption key to view document #442026.</p>
            
            <form id="password-form" onsubmit="checkPassword(event)">
                <input type="password" id="doc-password" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-center tracking-widest focus:outline-none focus:border-brand-accent focus:ring-2 focus:ring-brand-accent/20 transition-all mb-4" placeholder="••••••••" required>
                <p id="error-msg" class="text-red-500 text-xs font-bold uppercase tracking-widest hidden mb-4">Invalid Key</p>
                <button type="submit" class="w-full bg-brand-dark hover:bg-black text-white font-bold py-3 rounded-lg uppercase tracking-widest text-xs transition-colors">Decrypt & Open</button>
            </form>
            <div class="mt-6 text-xs text-gray-400 uppercase tracking-widest">
                <a href="/document/" class="hover:text-brand-dark transition-colors"><i class="fa-solid fa-arrow-left mr-1"></i> Back to Vault</a>
            </div>
        </div>
    </div>

    <main id="document-container" class="w-full max-w-4xl mx-auto hidden pt-12 pb-24 fade-in">
        <div class="mb-6">
            <a href="/document/" class="text-xs font-bold text-gray-500 hover:text-brand-dark uppercase tracking-widest transition-colors"><i class="fa-solid fa-arrow-left mr-2"></i>Return to Vault</a>
        </div>

        <div id="paper-content" class="bg-white p-12 md:p-20 paper-shadow border-t-8 border-brand-dark rounded-sm min-h-[1056px] relative">
            </div>
    </main>

    <script>
        // =====================================================================
        // SECURITY CONFIGURATION
        // =====================================================================
        const CORRECT_PASSWORD = "EGR2026"; // Change your document password here
        
        // The raw HTML of the letter is stored as an array of strings to obfuscate 
        // it from simple source-code scraping tools.
        const securePayload = [
            '<header class="flex flex-col md:flex-row justify-between items-start border-b-2 border-gray-200 pb-8 mb-10">',
            '    <div class="mb-6 md:mb-0">',
            '        <h1 class="text-3xl font-serif font-bold text-brand-dark uppercase tracking-widest mb-1">Office Of Tyler Nicholas</h1>',
            '        <p class="text-sm text-gray-500 tracking-wider">Victoria, Mahe, Seychelles</p>',
            '    </div>',
            '    <div class="text-left md:text-right text-xs text-gray-500 font-mono leading-relaxed">',
            '        <p>+248 2544788</p>',
            '        <p>tyler@nicholasoffice.online</p>',
            '        <p>https://nicholasoffice.online</p>',
            '    </div>',
            '</header>',
            '<div class="font-serif text-brand-dark leading-loose text-[15px] max-w-3xl">',
            '    <p class="font-bold mb-8 text-gray-400 font-sans tracking-widest uppercase text-xs">Date: April 4th 2026</p>',
            '    <p class="mb-6 font-bold">Dear Emirates Group Roblox Board of Directors,</p>',
            '    <p class="mb-6">I am writing to formally update you on my current professional and academic commitments, and to set clear expectations regarding my day-to-day involvement with Emirates Group Roblox moving forward.</p>',
            '    <p class="mb-6">Recently, my real-world schedule has expanded significantly. I have been appointed as a Youth Ambassador to the United States and elected as an Honorable member to the Seychelles National Youth Assembly.</p>',
            '    <p class="mb-6">Alongside these public service roles, I am solely managing the Tyler Nicholas Group, which now operates more than six subsidiary companies—including our most successful venture, BlueWave Digital, as well as the Tyler Nicholas Foundation and FoodShare Seychelles.</p>',
            '    <p class="mb-6">Additionally, as a student at Ecole Francaise Des Seychelles in Premiere General, I am preparing for my BAC in Maths and Physics this June.</p>',
            '    <p class="mb-6">This heavy academic load, coupled with frequent travel abroad, demands a substantial amount of my time.</p>',
            '    <p class="mb-6 font-bold bg-gray-50 p-4 border-l-4 border-brand-dark">I want to be completely transparent with this Board: I am incredibly occupied.</p>',
            '    <p class="mb-6">While my dedication to Emirates Group Roblox remains steadfast, my daily availability has been reduced significantly compared to the first three years of running this organization.</p>',
            '    <p class="mb-6">Please be assured that while my active, front-line presence is reduced, I am still actively providing for the group and building its future. Behind the scenes, I am currently developing several critical structural and technological upgrades, including:</p>',
            '    <ul class="list-disc pl-8 mb-8 space-y-3 font-sans text-sm text-gray-700">',
            '        <li>Emirates Group Roblox Staff Dashboard</li>',
            '        <li>Emirates Group Roblox New Hierarchy</li>',
            '        <li>Emirates Group Roblox New Subsidiary List</li>',
            '        <li>Emirates Group Roblox Discord Server(s) Overhaul</li>',
            '        <li>Emirates Group Roblox New Leadership Restructuring</li>',
            '        <li>And many more background developments.</li>',
            '    </ul>',
            '    <p class="mb-10">I trust the Executive Board to continue operating the group efficiently and maintaining our standards while I focus on these foundational projects and my external commitments. Thank you for your continued dedication to EGR.</p>',
            '    <div class="mt-12">',
            '        <p class="mb-4">Sincerely,</p>',
            '        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/John_Hancock_signature.svg/1200px-John_Hancock_signature.svg.png" alt="Signature" class="h-16 mb-4 opacity-80" style="filter: contrast(1.5) grayscale(1);">',
            '        <p class="font-bold uppercase tracking-widest text-sm font-sans">Tyler Nicholas</p>',
            '        <p class="text-xs text-gray-500 uppercase tracking-widest font-sans mt-1">Owner & Founder</p>',
            '    </div>',
            '</div>',
            '<div class="absolute bottom-8 right-12 opacity-10">',
            '    <i class="fa-solid fa-stamp text-6xl"></i>',
            '</div>'
        ];

        // =====================================================================
        // AUTHENTICATION LOGIC
        // =====================================================================
        function checkPassword(e) {
            e.preventDefault();
            const input = document.getElementById('doc-password').value;
            const errorMsg = document.getElementById('error-msg');
            const gate = document.getElementById('auth-gate');
            const docContainer = document.getElementById('document-container');
            const paper = document.getElementById('paper-content');

            if (input === CORRECT_PASSWORD) {
                // Success! Inject the payload.
                paper.innerHTML = securePayload.join('');
                
                // Hide Gate, Show Document
                gate.classList.add('opacity-0');
                setTimeout(() => {
                    gate.classList.add('hidden');
                    docContainer.classList.remove('hidden');
                }, 500);
            } else {
                // Failure
                errorMsg.classList.remove('hidden');
                document.getElementById('doc-password').value = '';
                document.getElementById('doc-password').focus();
            }
        }
    </script>
</body>
</html>
